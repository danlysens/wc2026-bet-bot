<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 Betting Bot</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1e1e24; color: #fff; text-align: center; padding: 20px; }
    .card { background: #2b2b36; border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    input, button { padding: 12px; margin: 10px 5px; border-radius: 8px; border: none; outline: none; }
    input { width: 80%; text-align: center; font-size: 16px; }
    .primary-btn { background: #007bff; color: white; cursor: pointer; font-weight: bold; width: 80%; }
    .primary-btn:hover { background: #0056b3; }
    .bet-btn { background: #28a745; color: white; width: 28%; font-size: 14px; cursor: pointer; font-weight: bold; }
    .bet-btn:hover { background: #218838; }
    .hidden { display: none; }
    .live-badge { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <div id="login-screen" class="card hidden">
    <h2>🏆 WC 2026 Bet</h2>
    <p>Register to claim 100 free tokens.</p>
    <input type="text" id="username" placeholder="Enter username">
    <button class="primary-btn" onclick="register()">Start Playing</button>
  </div>

  <div id="app-screen" class="card hidden">
    <h2>🏆 WC 2026 Betting</h2>
    <p>Player: <strong id="display-user"></strong></p>
    <p>Balance: <strong id="display-tokens" style="color: #f1c40f; font-size: 18px;"></strong> 🪙</p>
    
    <div id="match-container" style="margin-top: 20px; border-top: 1px solid #444; padding-top: 20px;">
      <p>Loading World Cup schedule...</p>
    </div>
  </div>

  <script>
    let user = JSON.parse(localStorage.getItem('wc_user'));
    
    // Check Login State on load
    if (!user) {
      document.getElementById('login-screen').classList.remove('hidden');
    } else {
      document.getElementById('app-screen').classList.remove('hidden');
      updateUI();
      fetchMatches();
      // Refresh API every 2 minutes (120,000 milliseconds)
      setInterval(fetchMatches, 120000); 
    }

    function register() {
      const name = document.getElementById('username').value.trim();
      if (!name) return alert("Please enter a username!");
      user = { name: name, tokens: 100, activeBet: null };
      updateUI();
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app-screen').classList.remove('hidden');
      fetchMatches();
    }

    function updateUI() {
      document.getElementById('display-user').innerText = user.name;
      document.getElementById('display-tokens').innerText = user.tokens;
      localStorage.setItem('wc_user', JSON.stringify(user));
    }

    async function fetchMatches() {
      const container = document.getElementById('match-container');
      try {
        const res = await fetch('/api/matches');
        const data = await res.json();
        
        if(!data.matches) return container.innerHTML = "<p>Error loading matches.</p>";

        // Resolve bet if the match is finished
        if (user.activeBet) {
          const betMatch = data.matches.find(m => m.id === user.activeBet.matchId);
          if (betMatch && betMatch.status === 'FINISHED') resolveBet(betMatch);
        }

        // Find closest match
        const activeMatches = data.matches.filter(m => m.status !== 'FINISHED');
        if (activeMatches.length === 0) return container.innerHTML = "<p>The tournament is over!</p>";
        
        // Sort by date so the closest game is first
        activeMatches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
        renderMatch(activeMatches[0]);

      } catch (err) {
        container.innerHTML = "<p>Connection error.</p>";
      }
    }

    function renderMatch(match) {
      const container = document.getElementById('match-container');
      const isLive = match.status === 'IN_PLAY' || match.status === 'PAUSED';
      const home = match.homeTeam.shortName || match.homeTeam.name || "TBD";
      const away = match.awayTeam.shortName || match.awayTeam.name || "TBD";
      
      let html = `<h3>${home} vs ${away}</h3>`;
      
      if (isLive) {
        const scoreHome = match.score?.fullTime?.home ?? 0;
        const scoreAway = match.score?.fullTime?.away ?? 0;
        html += `<p><span class="live-badge">LIVE</span></p>`;
        html += `<h1>${scoreHome} - ${scoreAway}</h1>`;
        
        if (user.activeBet && user.activeBet.matchId === match.id) {
           html += `<p style="color: #f1c40f;">You bet ${user.activeBet.amount} tokens on ${user.activeBet.pick}</p>`;
        } else {
           html += `<p>Match is underway. Betting is locked.</p>`;
        }
      } else {
        const date = new Date(match.utcDate).toLocaleString();
        html += `<p style="font-size: 14px; color: #aaa;">Starts: ${date}</p>`;
        
        if (user.activeBet) {
          if (user.activeBet.matchId === match.id) {
            html += `<p style="color: #f1c40f;">Locked in: ${user.activeBet.amount} tokens on ${user.activeBet.pick}. Good luck!</p>`;
          } else {
            html += `<p style="color: #f1c40f;">You have a pending bet on another match.</p>`;
          }
        } else {
          html += `
            <input type="number" id="bet-amount" placeholder="Amount (Tokens)" min="1" max="${user.tokens}">
            <br>
            <button class="bet-btn" onclick="placeBet(${match.id}, 'HOME')">${home}</button>
            <button class="bet-btn" onclick="placeBet(${match.id}, 'DRAW')">Draw</button>
            <button class="bet-btn" onclick="placeBet(${match.id}, 'AWAY')">${away}</button>
          `;
        }
      }
      container.innerHTML = html;
    }

    function placeBet(matchId, pick) {
      const amount = parseInt(document.getElementById('bet-amount').value);
      if (isNaN(amount) || amount <= 0) return alert("Enter a valid amount!");
      if (amount > user.tokens) return alert("Insufficient tokens!");

      user.tokens -= amount;
      user.activeBet = { matchId, pick, amount };
      updateUI();
      fetchMatches();
    }

    function resolveBet(match) {
      const scoreHome = match.score.fullTime.home;
      const scoreAway = match.score.fullTime.away;
      let winningPick = 'DRAW';
      
      if (scoreHome > scoreAway) winningPick = 'HOME';
      if (scoreAway > scoreHome) winningPick = 'AWAY';

      if (user.activeBet.pick === winningPick) {
        const winnings = user.activeBet.amount * 2;
        user.tokens += winnings;
        alert(`WIN! The result was ${winningPick}. You gained ${winnings} tokens!`);
      } else {
        alert(`LOSS. The result was ${winningPick}. Better luck next time.`);
      }
      
      user.activeBet = null;
      updateUI();
    }
  </script>
</body>
</html>
